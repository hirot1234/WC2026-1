function minuteValue(iso){ return Math.round(new Date(iso).getTime()/60000); }
function fmtDate(iso){ return new Intl.DateTimeFormat('ja-JP',{month:'numeric',day:'numeric',weekday:'short'}).format(new Date(iso)); }
function fmtTime(iso){ return new Intl.DateTimeFormat('ja-JP',{hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date(iso)); }
function isPlaceholderTeam(name){ return /^(tbd|winner|loser|\d+(st|nd|rd|th) group|3rd group)/i.test(String(name||'')); }
function makeKeys(date, home, away){ const h=normalizeName(home), a=normalizeName(away); return [`${date}-${h}-${a}`,`${date}-${a}-${h}`,`${date}-${[h,a].sort().join('-')}`]; }
function findResult(m){
  for (const k of makeKeys(dateKey(m.datetime),m.home,m.away)) if (state.byKey[k]) return state.byKey[k];
  if (isPlaceholderTeam(m.home)||isPlaceholderTeam(m.away)) return null;
  const d=dateKey(m.datetime), h=normalizeName(m.home), a=normalizeName(m.away), sm=minuteValue(m.datetime);
  return state.results.find(r => r.dateKey===d && ((r.homeNorm===h&&r.awayNorm===a)||(r.homeNorm===a&&r.awayNorm===h)) && Math.abs(minuteValue(r.date)-sm)<=180) || null;
}
function normalizeEspnEvent(ev){
  const comp = ev.competitions?.[0]; const competitors = comp?.competitors || [];
  const home = competitors.find(c=>c.homeAway==='home') || competitors[0];
  const away = competitors.find(c=>c.homeAway==='away') || competitors[1];
  if(!home || !away) return null;
  const hn = home.team?.displayName || home.team?.shortDisplayName || home.team?.name;
  const an = away.team?.displayName || away.team?.shortDisplayName || away.team?.name;
  const date = ev.date || comp.date;
  const obj = {date, dateKey: date ? new Date(date).toISOString().slice(0,10) : '', home:hn, away:an, homeNorm:normalizeName(hn), awayNorm:normalizeName(an), homeScore:home.score, awayScore:away.score, hasScore:home.score !== undefined && away.score !== undefined && home.score !== '' && away.score !== '', status:ev.status?.type?.shortDetail || ev.status?.type?.description || '', completed:!!ev.status?.type?.completed, source:'ESPN'};
  const localDate = date ? new Intl.DateTimeFormat('sv-SE',{timeZone:'Asia/Tokyo',year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date(date)) : obj.dateKey;
  obj.dateKey = localDate;
  const keys = makeKeys(obj.dateKey, hn, an); obj.key=keys[0]; obj.reverseKey=keys[1]; obj.teamSetKey=keys[2]; return obj;
}
async function fetchResults(){
  state.loading=true; renderNote();
  const urls = [
    'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611-20260719&limit=200',
    'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world_cup/scoreboard?dates=20260611-20260719&limit=200'
  ];
  let pulled=[]; let err='';
  for(const url of urls){
    try{ const res=await fetch(url,{cache:'no-store'}); if(!res.ok) throw new Error('HTTP '+res.status); const data=await res.json(); pulled=(data.events||[]).map(normalizeEspnEvent).filter(Boolean); if(pulled.length) break; }
    catch(e){ err=String(e.message||e); }
  }
  const embedded = MATCHES.filter(m=>m.staticStatus).map(m=>{ const o={date:m.datetime,dateKey:dateKey(m.datetime),home:m.home,away:m.away,homeNorm:normalizeName(m.home),awayNorm:normalizeName(m.away),homeScore:m.staticHomeScore,awayScore:m.staticAwayScore,hasScore:true,status:m.staticStatus,completed:true,source:'embedded'}; const keys=makeKeys(o.dateKey,o.home,o.away); o.key=keys[0]; o.reverseKey=keys[1]; o.teamSetKey=keys[2]; return o; });
  const map = new Map();
  embedded.forEach(r=>map.set(r.teamSetKey, r));
  pulled.forEach(r=>{
    const current = map.get(r.teamSetKey);
    // 外部APIにスコアが無い試合で、埋め込み済みの結果を上書きしない
    if(!current || r.hasScore || !current.hasScore) map.set(r.teamSetKey, r);
  });
  state.results=[...map.values()]; state.byKey={}; state.results.forEach(r=>[r.key,r.reverseKey,r.teamSetKey].forEach(k=>state.byKey[k]=r));
  state.lastUpdated=new Date(); state.loading=false; state.error = pulled.length ? '' : '外部APIから結果を取得できない場合は、埋め込み済みの結果だけ表示します。';
  render();
}
function renderNote(){ $('note').textContent = `📺 DAZNは全試合ライブ配信。${state.loading?'結果取得中… ':''}${state.lastUpdated ? '最終更新: '+state.lastUpdated.toLocaleTimeString('ja-JP')+' / ' : ''}取得済み結果: ${state.results.length}件`; }
function render(){
  renderNote(); $('error').style.display = state.error ? 'block':'none'; $('error').textContent = state.error;
  const q=state.q.toLowerCase();
  const filtered=MATCHES.filter(m=> (state.round==='すべて'||m.round===state.round) && (!state.onlyJapan || m.home==='Japan'||m.away==='Japan') && `${m.round} ${m.home} ${m.away} ${m.broadcast}`.toLowerCase().includes(q));
  $('count').textContent=filtered.length;
  const grouped={}; filtered.forEach(m=>{ const k=fmtDate(m.datetime); (grouped[k] ||= []).push(m); });
  $('list').innerHTML = Object.keys(grouped).length ? Object.entries(grouped).map(([date,games])=>`<section class="day"><h2>📅 ${date}</h2><div class="grid">${games.map(cardHtml).join('')}</div></section>`).join('') : '<div class="empty">該当する試合がありません</div>';
}
function cardHtml(m){
  const r=findResult(m); const isJapan=m.home==='Japan'||m.away==='Japan';
  const fallbackHasScore = m.staticHomeScore !== undefined && m.staticAwayScore !== undefined;
  const hasScore = r?.hasScore || fallbackHasScore;
  const homeScore = r?.hasScore ? r.homeScore : m.staticHomeScore;
  const awayScore = r?.hasScore ? r.awayScore : m.staticAwayScore;
  const score = hasScore ? `${homeScore} - ${awayScore}` : 'vs';
  const status = r?.status || m.staticStatus || '結果未取得 / 試合前';
  const completed = r?.completed || m.staticStatus === 'FT';
  const source = r?.source || (fallbackHasScore ? 'embedded' : '');
  const cls = completed ? 'done' : (hasScore ? 'live' : '');
  return `<article class="card ${isJapan?'japan':''}"><div class="meta"><span>${m.round}</span><b>${fmtTime(m.datetime)}</b></div><div class="teams"><span>${m.home}</span><em>${score}</em><span>${m.away}</span></div><div class="status ${cls}">${status}${source ? ' · '+source : ''}</div><div class="broadcast">📺 ${m.broadcast}</div></article>`;
}
function init(){
  const rounds=['すべて',...new Set(MATCHES.map(m=>m.round))]; $('round').innerHTML=rounds.map(r=>`<option>${r}</option>`).join('');
  $('q').addEventListener('input',e=>{state.q=e.target.value;render();}); $('round').addEventListener('change',e=>{state.round=e.target.value;render();});
  $('japan').addEventListener('click',()=>{state.onlyJapan=!state.onlyJapan;$('japan').classList.toggle('active',state.onlyJapan);render();});
  $('refresh').addEventListener('click',fetchResults); $('reset').addEventListener('click',()=>{state.q='';state.round='すべて';state.onlyJapan=false;$('q').value='';$('round').value='すべて';$('japan').classList.remove('active');render();});
  render(); fetchResults(); setInterval(fetchResults,60000);
}
init();
</script>
