function tokyoDateKey(dateStr){ return new Intl.DateTimeFormat('sv-SE',{timeZone:'Asia/Tokyo',year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date(dateStr)); }
function dateKey(iso){ return iso.slice(0,10); }
function minuteValue(iso){ return Math.round(new Date(iso).getTime()/60000); }
function fmtDate(iso){ return new Intl.DateTimeFormat('ja-JP',{month:'numeric',day:'numeric',weekday:'short'}).format(new Date(iso)); }
function fmtTime(iso){ return new Intl.DateTimeFormat('ja-JP',{hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date(iso)); }
function makeKeys(date, home, away){ const h=normalizeName(home), a=normalizeName(away); return [`${date}-${h}-${a}`,`${date}-${a}-${h}`,`${date}-${[h,a].sort().join('-')}`]; }
function isJapanMatch(m){ return normalizeName(m.home)==='japan'||normalizeName(m.away)==='japan'; }
function fallbackNear(dateIso, home, away){
  const d=dateKey(dateIso), sm=minuteValue(dateIso), h=normalizeName(home), a=normalizeName(away);
  return FALLBACK_MATCHES.find(m => {
    const mh=normalizeName(m.home), ma=normalizeName(m.away);
    return dateKey(m.datetime)===d && Math.abs(minuteValue(m.datetime)-sm)<=240 && ((mh===h&&ma===a)||(mh===a&&ma===h));
  });
}
function inferBroadcast(m){
  if(isJapanMatch(m)){
    if(dateKey(m.datetime)==='2026-06-15') return 'DAZN / 日本戦無料 / NHK';
    if(dateKey(m.datetime)==='2026-06-21') return 'DAZN / 日本戦無料 / 日本テレビ';
    if(dateKey(m.datetime)==='2026-06-26') return 'DAZN / 日本戦無料 / NHK';
    return 'DAZN / 日本戦無料';
  }
  if(m.round==='Final') return 'DAZN / NHK';
  return 'DAZN';
}
function roundFromEvent(ev){
  const texts = [ev.season?.type?.name, ev.group?.name, ev.competitions?.[0]?.notes?.[0]?.headline, ev.name, ev.shortName].filter(Boolean).join(' ');
  const m = texts.match(/Group\s+[A-L]/i); if(m) return m[0].replace(/group/i,'Group');
  if(/final/i.test(texts) && !/semi/i.test(texts)) return 'Final';
  if(/third|3rd/i.test(texts)) return '3rd Place Playoff';
  if(/semi/i.test(texts)) return 'Semifinal';
  if(/quarter/i.test(texts)) return 'Quarterfinal';
  if(/round of 16|r16/i.test(texts)) return 'Round of 16';
  if(/round of 32|r32/i.test(texts)) return 'Round of 32';
  const d = ev.date ? tokyoDateKey(ev.date) : '';
  const fallback = FALLBACK_MATCHES.find(x=>dateKey(x.datetime)===d && Math.abs(minuteValue(x.datetime)-minuteValue(toTokyoIso(ev.date)))<=240);
  return fallback?.round || 'World Cup';
}
function normalizeEspnEvent(ev){
  const comp = ev.competitions?.[0]; const competitors = comp?.competitors || [];
  const home = competitors.find(c=>c.homeAway==='home') || competitors[0];
  const away = competitors.find(c=>c.homeAway==='away') || competitors[1];
  if(!home || !away || !ev.date) return null;
  const hn = home.team?.displayName || home.team?.shortDisplayName || home.team?.name || 'TBD';
  const an = away.team?.displayName || away.team?.shortDisplayName || away.team?.name || 'TBD';
  const tIso = toTokyoIso(ev.date);
  const scoreAvailable = home.score !== undefined && away.score !== undefined && home.score !== '' && away.score !== '';
  const statusType = ev.status?.type || {};
  const r = {
    espnId: ev.id,
    date: ev.date,
    datetime: tIso,
    dateKey: dateKey(tIso),
    round: roundFromEvent(ev),
    home: hn,
    away: an,
    homeNorm: normalizeName(hn),
    awayNorm: normalizeName(an),
    homeScore: scoreAvailable ? home.score : undefined,
    awayScore: scoreAvailable ? away.score : undefined,
    hasScore: scoreAvailable,
    status: statusType.shortDetail || statusType.description || '',
    completed: !!statusType.completed,
    source: 'ESPN'
  };
  const keys=makeKeys(r.dateKey, hn, an); r.key=keys[0]; r.reverseKey=keys[1]; r.teamSetKey=keys[2];
  return r;
}
async function pullEspn(){
  let lastErr = '';
  for(const url of ESPN_ENDPOINTS){
    try{
      const res = await fetch(url, {cache:'no-store'});
      if(!res.ok) throw new Error('HTTP '+res.status);
      const data = await res.json();
      const events = (data.events || []).map(normalizeEspnEvent).filter(Boolean);
      if(events.length) return events;
    }catch(e){ lastErr = e.message || String(e); }
  }
  throw new Error(lastErr || '取得できませんでした');
}
function rebuildFromEvents(events){
  const rows = events.map((r, i) => {
    const base = fallbackNear(r.datetime, r.home, r.away);
    return {
      datetime: r.datetime,
      round: r.round || base?.round || 'World Cup',
      home: r.home,
      away: r.away,
      broadcast: base?.broadcast || inferBroadcast(r),
      id: r.espnId || base?.id || i+1,
      espnId: r.espnId,
      staticHomeScore: r.hasScore ? r.homeScore : base?.staticHomeScore,
      staticAwayScore: r.hasScore ? r.awayScore : base?.staticAwayScore,
      staticStatus: r.completed ? 'FT' : base?.staticStatus
    };
  }).sort((a,b)=>new Date(a.datetime)-new Date(b.datetime));
  if(rows.length >= 80) {
    MATCHES = rows;
    state.dynamic = true;
  } else {
    // 一部しか取れない場合は、埋め込み104試合を維持して結果だけ補完
    state.dynamic = false;
  }
}
function buildResultIndex(events){
  const embedded = FALLBACK_MATCHES.filter(m=>m.staticHomeScore!==undefined && m.staticAwayScore!==undefined).map(m=>{
    const o={date:m.datetime,datetime:m.datetime,dateKey:dateKey(m.datetime),home:m.home,away:m.away,homeNorm:normalizeName(m.home),awayNorm:normalizeName(m.away),homeScore:m.staticHomeScore,awayScore:m.staticAwayScore,hasScore:true,status:m.staticStatus||'FT',completed:m.staticStatus==='FT',source:'embedded'};
    const keys=makeKeys(o.dateKey,o.home,o.away); o.key=keys[0]; o.reverseKey=keys[1]; o.teamSetKey=keys[2]; return o;
  });
  const map = new Map();
  embedded.forEach(r=>map.set(r.teamSetKey, r));
  events.forEach(r=>{
    const current = map.get(r.teamSetKey);
    if(!current || r.hasScore || !current.hasScore) map.set(r.teamSetKey, r);
  });
  state.results=[...map.values()];
  state.byKey={}; state.results.forEach(r=>[r.key,r.reverseKey,r.teamSetKey].forEach(k=>state.byKey[k]=r));
}
function findResult(m){
  for(const k of makeKeys(dateKey(m.datetime),m.home,m.away)) if(state.byKey[k]) return state.byKey[k];
  const d=dateKey(m.datetime), h=normalizeName(m.home), a=normalizeName(m.away), sm=minuteValue(m.datetime);
  return state.results.find(r => r.dateKey===d && Math.abs(minuteValue(r.datetime||r.date)-sm)<=240 && ((r.homeNorm===h&&r.awayNorm===a)||(r.homeNorm===a&&r.awayNorm===h))) || null;
}
async function refreshData(){
  state.loading=true; state.error=''; renderNote();
  try{
    const events = await pullEspn();
    rebuildFromEvents(events);
    buildResultIndex(events);
    state.lastUpdated = new Date();
  }catch(e){
    state.error = '外部APIから取得できませんでした。埋め込み済みデータで表示しています。詳細: ' + (e.message || e);
    state.dynamic = false;
    buildResultIndex([]);
  }
  state.loading=false;
  refreshRoundOptions();
  render();
}
function refreshRoundOptions(){
  const current = state.round;
  const rounds=['すべて',...new Set(MATCHES.map(m=>m.round).filter(Boolean))];
  $('round').innerHTML=rounds.map(r=>`<option>${r}</option>`).join('');
  state.round = rounds.includes(current) ? current : 'すべて';
  $('round').value = state.round;
}
function renderNote(){
  $('note').textContent = `📺 DAZNは全試合ライブ配信。${state.loading?'外部データ取得中… ':''}${state.lastUpdated ? '最終更新: '+state.lastUpdated.toLocaleTimeString('ja-JP')+' / ' : ''}カード: ${MATCHES.length}件 / 結果: ${state.results.length}件`;
  $('source').textContent = state.dynamic ? 'source: ESPN dynamic cards' : 'source: fallback schedule';
}
function render(){
  renderNote();
  $('error').style.display = state.error ? 'block':'none';
  $('error').textContent = state.error;
  const q=state.q.toLowerCase();
  const filtered = MATCHES.filter(m => (state.round==='すべて'||m.round===state.round) && (!state.onlyJapan||isJapanMatch(m)) && `${m.round} ${m.home} ${m.away} ${m.broadcast}`.toLowerCase().includes(q));
  $('count').textContent = `${filtered.length} matches`;
  const grouped={}; filtered.forEach(m=>{ const k=fmtDate(m.datetime); (grouped[k] ||= []).push(m); });
  $('list').innerHTML = Object.keys(grouped).length ? Object.entries(grouped).map(([date,games])=>`<section class="day"><h2>📅 ${date}</h2><div class="grid">${games.map(cardHtml).join('')}</div></section>`).join('') : '<div class="empty">該当する試合がありません</div>';
}
function cardHtml(m){
  const r=findResult(m); const hasScore = r?.hasScore || (m.staticHomeScore!==undefined && m.staticAwayScore!==undefined);
  const homeScore = r?.hasScore ? r.homeScore : m.staticHomeScore;
  const awayScore = r?.hasScore ? r.awayScore : m.staticAwayScore;
  const score = hasScore ? `${homeScore} - ${awayScore}` : 'vs';
  const status = r?.status || m.staticStatus || '試合前 / 未確定';
  const completed = r?.completed || m.staticStatus==='FT';
  const live = hasScore && !completed;
  return `<article class="card ${isJapanMatch(m)?'japan':''}"><div class="meta"><span>${m.round}</span><b>${fmtTime(m.datetime)}</b></div><div class="teams"><span>${m.home}</span><em>${score}</em><span>${m.away}</span></div><div class="status ${completed?'done':live?'live':''}">${status}${r?.source ? ' · '+r.source : ''}</div><div class="broadcast">📺 ${m.broadcast}</div></article>`;
}
function init(){
  refreshRoundOptions();
  $('q').addEventListener('input',e=>{state.q=e.target.value;render();});
  $('round').addEventListener('change',e=>{state.round=e.target.value;render();});
  $('japan').addEventListener('click',()=>{state.onlyJapan=!state.onlyJapan;$('japan').classList.toggle('active',state.onlyJapan);render();});
  $('refresh').addEventListener('click',refreshData);
  $('reset').addEventListener('click',()=>{state.q='';state.round='すべて';state.onlyJapan=false;$('q').value='';$('japan').classList.remove('active');refreshRoundOptions();render();});
  buildResultIndex([]); render(); refreshData(); setInterval(refreshData, 60*1000);
}
init();
</script>
